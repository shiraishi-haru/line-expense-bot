# Render デプロイ用
# https://render.com の Dashboard で Web Service を New し、リポジトリを連携したうえで
# 以下の環境変数を設定してください。build/start は下記の通りです。

services:
  - type: web
    name: line-expense-bot
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_ADMIN_USER_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: line-expense-db
          property: connectionString
      - key: DEFAULT_INVITE_CODE
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON_PATH
        sync: false
      - key: GOOGLE_SPREADSHEET_ID
        sync: false

databases:
  - name: line-expense-db
    plan: free
    databaseName: line_expense
    user: line_expense
